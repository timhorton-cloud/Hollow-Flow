<!DOCTYPE html>
<html>
<head>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f0f0f">

<meta charset="UTF-8">
<title>Hollow-Flow ELITE</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
  margin:0;
  background:#0f0f0f;
  font-family:Arial;
  text-align:center;
  color:#ddd;
  user-select:none;
}

/* PANEL WITH SUBTLE LIGHT */
.panel{
  margin:40px auto;
  width:500px;
  padding:25px;
  border-radius:14px;
  background:
    linear-gradient(#2a2a2a,#141414),
    radial-gradient(circle at top, rgba(255,255,255,0.06), transparent 60%);
  box-shadow:
    inset 0 0 25px rgba(0,0,0,0.9),
    0 10px 30px rgba(0,0,0,0.9);
}

canvas{
  background:#000;
  border-radius:8px;
  margin-bottom:30px;
}

.knobRow{
  display:flex;
  justify-content:space-around;
  margin-bottom:30px;
}

.knobWrap{
  position:relative;
  width:140px;
  height:180px;
}

.knob{
  width:60px;
  height:60px;
  border-radius:50%;
  position:absolute;
  top:55px;
  left:40px;
  cursor:pointer;
  background:radial-gradient(circle,#333,#000);
  border:2px solid #111;
  touch-action: none;
}

/* DOTS */
.dot{
  position:absolute;
  width:5px;
  height:5px;
  border-radius:50%;
  transform:translate(-50%,-50%);
  background:#333;
  opacity:0.2;
  transition:all 0.2s ease;
}

/* LABELS */
.label{
  position:absolute;
  font-size:10px;
  color:#777;
  transform:translate(-50%,-50%);
  transition:all 0.2s ease;
}

.label.active{
  color:#fff;
  text-shadow:0 0 6px currentColor;
}

.title{
  position:absolute;
  bottom:10px;
  width:100%;
  font-size:12px;
  letter-spacing:2px;
}

.mobileBar{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  display:flex;
  gap:8px;
  padding:10px;
  background:rgba(0,0,0,0.9);
  backdrop-filter:blur(10px);
  border-top:1px solid #222;
  justify-content:space-between;
  z-index:999;
}

.mBtn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  flex:1;
  padding:12px;
  border-radius:10px;
  background:#111;
  color:#ddd;
  border:1px solid #333;
  font-size:16px;
}

.mBtn.primary{
  background:#ff3b3b;
  color:#fff;
}

.mSelect{
  flex:1;
  padding:12px;
  border-radius:10px;
  background:#111;
  color:#ddd;
  border:1px solid #333;
}

</style>
</head>
<body>

<div class="panel">
<canvas id="meter" width="340" height="150"></canvas>
<div class="knobRow" id="row1"></div>
<div class="knobRow" id="row2"></div>

<div style="margin-top:20px;">
  <pre id="output" style="text-align:left;background:#000;padding:12px;border-radius:10px;margin-top:10px;max-height:260px;min-height:260px;overflow:auto;transition:opacity 0.2s ease;"></pre>
</div>
</div>

</div>

<script>

const config={
  beat:["HipHop","Boom","Trap","Drill"],
  flow:["Slow","Mid","Fast","Trip"],
  mood:["Dark","Vibe","Hype","Pray"],
  heat:["Cool","Warm","Hot","Fire"]
};

const colors={
  beat:["#5a0000","#ff3b3b"],
  flow:["#003c4a","#00d4ff"],
  mood:["#2e1065","#a855f7"],
  heat:["#5a2d00","#ff9800"]
};

let state={beat:0,flow:0,mood:0,heat:0};

let locked=false;
let genTimeout;

function lerpColor(a,b,t){
  const ah=parseInt(a.replace("#",""),16),
        bh=parseInt(b.replace("#",""),16),
        ar=ah>>16, ag=ah>>8&0xff, ab=ah&0xff,
        br=bh>>16, bg=bh>>8&0xff, bb=bh&0xff;
  return "#" + (
    (1<<24) +
    (Math.round(ar + (br-ar)*t)<<16) +
    (Math.round(ag + (bg-ag)*t)<<8) +
    Math.round(ab + (bb-ab)*t)
  ).toString(16).slice(1);
}

function makeKnob(name){

  const wrap=document.createElement("div");
  wrap.className="knobWrap";

  const knob=document.createElement("div");
  knob.className="knob";
  wrap.appendChild(knob);

  const title=document.createElement("div");
  title.className="title";
  title.innerText=name.toUpperCase();
  wrap.appendChild(title);

  const cx=70, cy=95, r=48;
  const totalTicks=16;

  const dots=[];
  const labels=[];

  for(let i=0;i<=totalTicks;i++){
    const a=(-210+(240/totalTicks)*i)*Math.PI/180;
    const x=cx+Math.cos(a)*(r);
    const y=cy+Math.sin(a)*(r);

    const d=document.createElement("div");
    d.className="dot";
    d.style.left=x+"px";
    d.style.top=y+"px";

    wrap.appendChild(d);
    dots.push(d);
  }

  const positions=[-210,-150,-30,30];

  config[name].forEach((text,i)=>{
    const rad=positions[i]*Math.PI/180;
    const x=cx+Math.cos(rad)*(r+14);
    const y=cy+Math.sin(rad)*(r+14);

    const l=document.createElement("div");
    l.className="label";
    l.innerText=text;
    l.style.left=x+"px";
    l.style.top=y+"px";

    wrap.appendChild(l);
    labels.push(l);
  });

  let index=0;
  let angle=-210;
  let dragging=false;
  let startY=0;
  let startAngle=angle;
  let smoothIndex=0;

  function render(){
    smoothIndex += (index - smoothIndex) * 0.15;
    const activeLevel = smoothIndex / 3;

    dots.forEach((d,i)=>{
      const t = i / totalTicks;
      const active = t <= activeLevel;

      if(active){
        const color = lerpColor(colors[name][0], colors[name][1], t/activeLevel || 0);
        d.style.background=color;
        d.style.opacity=1;
        d.style.boxShadow=`0 0 10px ${color}`;
      } else {
        d.style.background="#333";
        d.style.opacity=0.2;
        d.style.boxShadow="none";
      }
    });

    labels.forEach((l,i)=>{
      l.classList.toggle("active", i===index);
    });

    requestAnimationFrame(render);
  }

  function move(e){
    if(!dragging) return;

    let delta=(startY-e.clientY)*0.5;
    angle=startAngle+delta;
    angle=Math.max(-210,Math.min(30,angle));

    index=Math.round((angle+210)/80);
    index=Math.max(0,Math.min(3,index));
    state[name]=index;
    

    
  }

  function up(){
    dragging=false;
    window.removeEventListener("mousemove",move);
    window.removeEventListener("mouseup",up);
  }

  // DESKTOP
knob.addEventListener("mousedown",(e)=>{
  dragging=true;
  startY=e.clientY;
  startAngle=angle;
  window.addEventListener("mousemove",move);
  window.addEventListener("mouseup",up);
});

// MOBILE
knob.addEventListener("touchstart",(e)=>{
  dragging=true;
  startY=e.touches[0].clientY;
  startAngle=angle;
  window.addEventListener("touchmove",moveTouch);
  window.addEventListener("touchend",upTouch);
});

// TOUCH MOVE
function moveTouch(e){
  if(!dragging) return;

  let delta=(startY - e.touches[0].clientY)*0.5;
  angle=startAngle + delta;
  angle=Math.max(-210,Math.min(30,angle));

  index=Math.round((angle+210)/80);
  index=Math.max(0,Math.min(3,index));
  state[name]=index;
}

// TOUCH END
function upTouch(){
  dragging=false;
  window.removeEventListener("touchmove",moveTouch);
  window.removeEventListener("touchend",upTouch);
}

  render();
  return wrap;
}

["beat","flow"].forEach(k=>{
  document.getElementById("row1").appendChild(makeKnob(k));
});
["mood","heat"].forEach(k=>{
  document.getElementById("row2").appendChild(makeKnob(k));
});

const canvas=document.getElementById("meter");
const ctx=canvas.getContext("2d");

let meterCurrent=0;
let meterTarget=0;

function drawMeter(){
  ctx.clearRect(0,0,340,150);
  const cx=170,cy=130,r=105;

  for(let i=0;i<=20;i++){
    let angle=Math.PI*1.1+(i/20)*(Math.PI*0.8);

    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(angle)*(r-8),cy+Math.sin(angle)*(r-8));
    ctx.lineTo(cx+Math.cos(angle)*r,cy+Math.sin(angle)*r);
    ctx.strokeStyle=i%5===0?"#aaa":"#555";
    ctx.lineWidth=i%5===0?2:1;
    ctx.stroke();

    if(i%5===0){
      ctx.fillStyle="#aaa";
      ctx.font="9px Arial";
      ctx.textAlign="center";
      ctx.fillText(i,cx+Math.cos(angle)*(r-18),cy+Math.sin(angle)*(r-18));
    }
  }

  ctx.fillStyle="#fff";
  ctx.fillText("dB",cx,82);

  ctx.fillStyle="#ff3b3b";
  ctx.shadowBlur=20;
  ctx.shadowColor="#ff3b3b";
  ctx.font="16px Arial";
  ctx.fillText("Hollow-Flow",cx,100);
  ctx.shadowBlur=0;

  let energy=(state.beat+state.flow+state.mood+state.heat)/4;
  meterCurrent += ((energy*5 + Math.random()*2) - meterCurrent) * 0.08;

  let angle=Math.PI*1.1+(meterCurrent/20)*(Math.PI*0.8);

  ctx.beginPath();
  ctx.moveTo(cx,cy);
  ctx.lineTo(cx+Math.cos(angle)*(r-20),cy+Math.sin(angle)*(r-20));
  ctx.strokeStyle="#ff3b3b";
  ctx.lineWidth=3;
  ctx.stroke();

  requestAnimationFrame(drawMeter);
}

drawMeter();


function toggleLock(){
  locked = !locked;
  
  const btn = document.getElementById("lockBtn");
  if(locked){
    btn.innerText = "🔓 Unlock";
  } else {
    btn.innerText = "🔒 Lock";
  }

}




let takes = [];

function applyPreset(){
  const p = document.getElementById("preset").value;

  if(p==="trap_fire"){
    state = {beat:3, flow:2, mood:1, heat:3};
  }
  if(p==="boom_bap_real"){
    state = {beat:1, flow:1, mood:0, heat:1};
  }
  if(p==="worship_vibe"){
    state = {beat:0, flow:0, mood:3, heat:1};
  }

  if(!locked) generateLyrics();
}

function saveTake(){
  const text = document.getElementById("output").innerText;
  if(!text) return;
  takes.push(text);
  alert("Saved Take #" + takes.length);
}

async function generateLyrics(variation=false){

  const flowMap = ["Slow","Mid","Fast","Triplet"];
  const beatMap = ["Hip Hop","Boom Bap","Old School","Trap"];
  const moodMap = ["Dark","Vibe","Hype","Worship"];
  const heatMap = ["Cool","Warm","Hot","Fire"];

  const flow = flowMap[state.flow];
  const beat = beatMap[state.beat];
  const mood = moodMap[state.mood];
  const heat = heatMap[state.heat];

  const prompt = `
Write a Christian rap song.

Requirements:
- 2 LONG verses
- Must rhyme
- Not cliché
- Sound like a real artist

Style:
- Beat: ${beat}
- Flow: ${flow}
- Mood: ${mood}
- Energy: ${heat}

${variation ? 'Make this a DIFFERENT variation with new phrasing and structure.' : ''}
`;

  const output = document.getElementById("output");
  const scrollPos = output.scrollTop;
  output.style.opacity = 0.3;
  output.innerText = "Generating...";
  output.scrollTop = scrollPos;

  try{

    const res = await fetch("/lyrics", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ prompt })
    });

    const data = await res.json();

    if(data.error){
      output.innerText = "Server error";
      return;
    }

    const scrollPos2 = output.scrollTop;
    setTimeout(()=>{
      output.innerText = data.text;
      output.style.opacity = 1;
      output.scrollTop = scrollPos2;
    }, 80);

  } catch(err){
    console.error(err);
    output.innerText = "Server not running";
  }
}

</script>

<div class="mobileBar">
  <button onclick="generateLyrics()" class="mBtn primary">● Generate</button>
  <button onclick="generateLyrics(true)" class="mBtn">↻ Remix</button>
  <button onclick="saveTake()" class="mBtn">💾 Save</button>
  <button onclick="toggleLock()" id="lockBtn" class="mBtn">🔒 Lock</button>
  <select id="preset" onchange="applyPreset()" class="mSelect">
    <option value="">Preset</option>
    <option value="trap_fire">Trap</option>
    <option value="boom_bap_real">Boom</option>
    <option value="worship_vibe">Worship</option>
  </select>
</div>


<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>

</body>
</html>
